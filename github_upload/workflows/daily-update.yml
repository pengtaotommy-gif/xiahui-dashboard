name: Daily Dashboard Update

on:
  schedule:
    # 每天 10:00 北京时间 (= 02:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:  # 手动触发（网页上点一下就能跑）

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl httpx

      - name: Fetch email and build data
        env:
          PENGUIN_EMAIL: ${{ secrets.PENGUIN_EMAIL }}
          PENGUIN_PASSWORD: ${{ secrets.PENGUIN_PASSWORD }}
        run: |
          cat << 'EOF' > update.py
          import imaplib, email, socket, os, json, re
          import pandas as pd
          from email.header import decode_header

          DATA_FILE = "latest_data.xlsx"
          EMAILED = os.environ.get("PENGUIN_EMAIL", "penguin0309@sina.com")
          PASSWORD = os.environ.get("PENGUIN_PASSWORD", "de9f16e5a00db45a")
          IMAP_HOST = "imap.sina.com"
          IMAP_PORT = 993

          def ds(s):
              if not s: return ""
              parts = decode_header(s)
              out = []
              for part, enc in parts:
                  if isinstance(part, bytes):
                      out.append(part.decode(enc or 'utf-8', errors='replace'))
                  else:
                      out.append(part)
              return ''.join(out)

          print("Connecting to mailbox...")
          socket.setdefaulttimeout(30)
          try:
              mail = imaplib.IMAP4_SSL(IMAP_HOST, IMAP_PORT)
              mail.login(EMAILED, PASSWORD)
              mail.select("INBOX")
              status, messages = mail.search(None, 'ALL')
              all_ids = messages[0].split()
              print(f"Total {len(all_ids)} emails")
              target_att = None
              for mid in reversed(all_ids):
                  try:
                      status, msg_data = mail.fetch(mid, '(RFC822)')
                      if not msg_data or not msg_data[0]: continue
                      raw = msg_data[0][1]
                      if not isinstance(raw, bytes): continue
                      msg = email.message_from_bytes(raw)
                      subj = ds(msg.get("Subject", ""))
                      if "发布者日发布监控" in subj or "发布者监控" in subj:
                          for part in msg.walk():
                              fn = part.get_filename()
                              fn_dec = ds(fn) if fn else ""
                              if '.xlsx' in fn_dec.lower() or 'xlsm' in fn_dec.lower():
                                  target_att = part.get_payload(decode=True)
                                  print(f"Found: {subj}, att: {fn_dec}")
                                  break
                      if target_att: break
                  except: continue
              mail.logout()
          except Exception as e:
              print(f"Mail error: {e}")
              exit(1)

          if not target_att:
              print("No attachment found!")
              exit(1)

          with open(DATA_FILE, 'wb') as f:
              f.write(target_att)
          print(f"Saved to {DATA_FILE}")

          # Parse Excel → generate simple JSON + HTML
          try:
              df = pd.read_excel(DATA_FILE)
              df.columns = ['date','uid','nickname','member_tier','mobile','publish','quote','match']
              df['date'] = pd.to_datetime(df['date']).dt.strftime('%Y-%m-%d')
              df["month"] = pd.to_datetime(df["date"]).dt.to_period("M").astype(str)
              df['mobile'] = df['mobile'].astype(str).str.replace('.0','',regex=False)
              df["publish"] = pd.to_numeric(df["publish"], errors='coerce').fillna(0).astype(int)
              df["quote"] = pd.to_numeric(df["quote"], errors='coerce').fillna(0).astype(int)
              df["match"] = pd.to_numeric(df["match"], errors='coerce').fillna(0).astype(int)

              def assign_tier(p):
                  if p>=300: return 'V5'
                  elif p>=100: return 'V4'
                  elif p>=30: return 'V3'
                  elif p>=5: return 'V2'
                  return 'V1'

              user_month = df.groupby(['month','uid']).agg(
                  nickname=('nickname','last'),
                  publish=('publish','sum'),
                  quote=('quote','sum'),
                  match=('match','sum')
              ).reset_index()
              user_month['tier'] = user_month['publish'].apply(assign_tier)

              daily = df.groupby('date').agg(
                  publishers=('uid','nunique'),
                  publish=('publish','sum'),
                  quote=('quote','sum'),
                  match=('match','sum')
              ).reset_index().sort_values('date')

              latest = daily.iloc[-1]
              print(f"Latest: {latest['date']}, publishers={latest['publishers']}, publish={latest['publish']}")

              # Write compact summary
              compact = {"latest_date": latest['date'], "latest": {
                  "publishers": int(latest['publishers']),
                  "publish": int(latest['publish']),
                  "quote": int(latest['quote']),
                  "match": int(latest['match']),
                  "response_rate": round(latest['quote']/latest['publish']*100,1) if latest['publish']>0 else 0,
                  "match_rate": round(latest['match']/latest['quote']*100,1) if latest['quote']>0 else 0
              }}
              with open("dashboard_data_compact.json", "w") as f:
                  json.dump(compact, f, ensure_ascii=False, indent=2)

              # Write daily trend (last 30 days)
              daily_list = []
              for _, row in daily.tail(30).iterrows():
                  r = row['quote']
                  p = row['publish']
                  m = row['match']
                  daily_list.append({
                      "date": row['date'],
                      "publishers": int(row['publishers']),
                      "publish": int(row['publish']),
                      "quote": int(r), "match": int(m),
                      "response_rate": round(r/p*100,1) if p>0 else 0,
                      "match_rate": round(m/r*100,1) if r>0 else 0
                  })
              with open("dashboard_daily.json", "w") as f:
                  json.dump(daily_list, f, ensure_ascii=False)

              # Write simple dashboard HTML (inline JS, no external deps)
              dates = [d['date'][5:] for d in daily_list]
              pubs = [d['publishers'] for d in daily_list]
              pubs2 = [d['publish'] for d in daily_list]
              matches = [d['match'] for d in daily_list]
              resp = [d['response_rate'] for d in daily_list]

              html = f"""<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>发布者监控看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;font-size:14px}}
h1{{color:#fff;margin-bottom:20px}}
.kpi{{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}}
.card{{background:#1a1a2e;border-radius:10px;padding:16px;flex:1;min-width:140px}}
.card .label{{color:#888;font-size:12px;margin-bottom:4px}}
.card .value{{font-size:24px;font-weight:700;color:#4fc3f7}}
.card .sub{{color:#666;font-size:11px;margin-top:2px}}
.chart{{background:#1a1a2e;border-radius:10px;padding:16px;height:360px;margin-bottom:20px}}
table{{width:100%;border-collapse:collapse;font-size:12px}}
th{{text-align:left;padding:8px 6px;color:#888;border-bottom:1px solid #2a2a3a}}
td{{padding:8px 6px;border-bottom:1px solid #1e1e2e}}
tr:hover{{background:#1e1e2e}}
.badge{{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}}
.V5{{background:#ffd700;color:#000}}.V4{{background:#c0c0c0;color:#000}}
.V3{{background:#cd7f32;color:#fff}}.V2{{background:#4a4a6a;color:#ccc}}
.V1{{background:#2a2a4a;color:#888}}
</style></head><body>
<h1>📊 发布者监控看板 <span style="font-size:12px;color:#666;font-weight:normal">更新: {latest['date']}</span></h1>
<div class="kpi">
  <div class="card"><div class="label">发布人数</div><div class="value">{latest['publishers']}</div></div>
  <div class="card"><div class="label">发布量</div><div class="value">{latest['publish']}</div></div>
  <div class="card"><div class="label">报价量</div><div class="value">{latest['quote']}</div></div>
  <div class="card"><div class="label">匹配量</div><div class="value">{latest['match']}</div></div>
  <div class="card"><div class="label">响应率</div><div class="value">{round(latest['quote']/latest['publish']*100,1) if latest['publish']>0 else 0}%</div></div>
  <div class="card"><div class="label">匹配率</div><div class="value">{round(latest['match']/latest['quote']*100,1) if latest['quote']>0 else 0}%</div></div>
</div>
<div class="chart" id="chart"></div>
<div id="table-wrap"></div>
<script>
var DAILY={daily_list};
var chart=echarts.init(document.getElementById('chart'));
chart.setOption({{
  backgroundColor:'transparent',
  tooltip:{{trigger:'axis',backgroundColor:'#1a1a2e',textStyle:{{color:'#ccc'}}}},
  legend:{{data:['发布人数','发布量','匹配量','响应率'],top:0}},
  xAxis={{type:'category',data:{dates},axisLine:{{lineStyle:{{color:'#2a2a3a'}}}}}},
  yAxis=[
    {{type:'value',name:'人数/量',axisLine:{{lineStyle:{{color:'#2a2a3a'}}}}}},
    {{type:'value',name:'%',axisLine:{{lineStyle:{{color:'#2a2a3a'}}}}}}
  ],
  series:[
    {{name:'发布人数',type:'line',data:{pubs},smooth:true,itemStyle:{{color:'#4fc3f7'}}}},
    {{name:'发布量',type:'line',data:{pubs2},smooth:true,itemStyle:{{color:'#66bb6a'}}}},
    {{name:'匹配量',type:'line',data:{matches},smooth:true,itemStyle:{{color:'#ff9800'}}}},
    {{name:'响应率',type:'line',yAxisIndex:1,data:{resp},smooth:true,itemStyle:{{color:'#ef5350'}}}}
  ]
}});

var TIERS=['V5','V4','V3','V2','V1'];
var byTier={{}};
DAILY.forEach(d=>{{
  d.tier&&(byTier[d.tier]=byTier[d.tier]||[]).push(d);
}});
var html='<table><thead><tr><th>日期</th><th>分层</th><th>发布人数</th><th>发布量</th><th>匹配量</th><th>响应率</th><th>匹配率</th></tr></thead><tbody>';
DAILY.slice(-14).reverse().forEach(d=>{{
  var r=d.quote,p=d.publish,m=d.match;
  var rr=p>0?(r/p*100).toFixed(1):'0';
  var mr=r>0?(m/r*100).toFixed(1):'0';
  var t=d.tier||'V1';
  html+='<tr><td>'+d.date+'</td><td><span class="badge '+t+'">'+t+'</span></td><td>'+d.publishers+'</td><td>'+d.publish+'</td><td>'+d.match+'</td><td>'+rr+'%</td><td>'+mr+'%</td></tr>';
}});
html+='</tbody></table>';
document.getElementById('table-wrap').innerHTML=html;
</script></body></html>"""

              with open("dashboard_simple.html", "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"dashboard_simple.html written, {len(html)} bytes")

              # Copy echarts locally (for offline use)
              import urllib.request
              try:
                  urllib.request.urlretrieve(
                      "https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js",
                      "echarts.min.js")
                  print("echarts.min.js downloaded")
              except:
                  print("Warning: echarts download failed, using CDN in HTML")

              print("Done! All files updated.")
          except Exception as e:
              print(f"Parse error: {e}")
              import traceback; traceback.print_exc()
              exit(1)
          EOF
          python3 update.py

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M')"
          git push
