name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas openpyxl

      - name: Download and run update script
        env:
          PENGUIN_EMAIL: ${{ secrets.PENGUIN_EMAIL }}
          PENGUIN_PASSWORD: ${{ secrets.PENGUIN_PASSWORD }}
        run: |
          curl -sL https://raw.githubusercontent.com/pengtaotommy-gif/xiahui-dashboard/main/update-dashboard.py -o update-dashboard.py
          python3 update-dashboard.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M')"
          git push
