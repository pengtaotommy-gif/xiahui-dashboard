<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>发布者监控看板</title>
<script src="./echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;font-size:14px}
h1{color:#fff;margin-bottom:20px}
.kpi{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.card{background:#1a1a2e;border-radius:10px;padding:16px;flex:1;min-width:140px}
.card .label{color:#888;font-size:12px;margin-bottom:4px}
.card .value{font-size:24px;font-weight:700;color:#4fc3f7}
.chart{background:#1a1a2e;border-radius:10px;padding:16px;height:360px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;color:#888;border-bottom:1px solid #2a2a3a}
td{padding:8px 6px;border-bottom:1px solid #1e1e2e}
tr:hover{background:#1e1e2e}
</style>
</head><body>
<h1>📊 发布者监控看板</h1>
<div class="kpi" id="kpi"><div class="card"><div class="label">加载中...</div></div></div>
<div class="chart" id="chart"></div>
<div id="table-wrap"></div>
<script>
var rawData = [{"date":"2026-06-10","publishers":467,"publish":821,"quote":692,"match":331,"response_rate":84.3,"match_rate":47.8},{"date":"2026-06-11","publishers":472,"publish":843,"quote":709,"match":339,"response_rate":84.1,"match_rate":47.8},{"date":"2026-06-12","publishers":481,"publish":851,"quote":718,"match":344,"response_rate":84.4,"match_rate":47.9},{"date":"2026-06-13","publishers":478,"publish":835,"quote":702,"match":336,"response_rate":84.1,"match_rate":47.9},{"date":"2026-06-14","publishers":485,"publish":849,"quote":715,"match":342,"response_rate":84.2,"match_rate":47.8},{"date":"2026-06-15","publishers":489,"publish":858,"quote":722,"match":346,"response_rate":84.2,"match_rate":47.9},{"date":"2026-06-16","publishers":486,"publish":855,"quote":720,"match":344,"response_rate":84.2,"match_rate":47.8}];
var latest = rawData[rawData.length - 1];
document.getElementById("kpi").innerHTML = 
  "<div class=\"card\"><div class=\"label\">发布人数</div><div class=\"value\">" + latest.publishers + "</div></div>" +
  "<div class=\"card\"><div class=\"label\">发布量</div><div class=\"value\">" + latest.publish + "</div></div>" +
  "<div class=\"card\"><div class=\"label\">报价量</div><div class=\"value\">" + latest.quote + "</div></div>" +
  "<div class=\"card\"><div class=\"label\">匹配量</div><div class=\"value\">" + latest.match + "</div></div>" +
  "<div class=\"card\"><div class=\"label\">响应率</div><div class=\"value\">" + latest.response_rate + "%</div></div>" +
  "<div class=\"card\"><div class=\"label\">匹配率</div><div class=\"value\">" + latest.match_rate + "%</div></div>";
var dates = [];
var pubs = [];
var pubs2 = [];
var matches = [];
var resp = [];
for (var i = 0; i < rawData.length; i++) {
  dates.push(rawData[i].date.substring(5));
  pubs.push(rawData[i].publishers);
  pubs2.push(rawData[i].publish);
  matches.push(rawData[i].match);
  resp.push(rawData[i].response_rate);
}
var chart = echarts.init(document.getElementById("chart"));
chart.setOption({
  backgroundColor: "transparent",
  tooltip: {trigger: "axis", backgroundColor: "#1a1a2e", textStyle: {color: "#ccc"}},
  legend: {data: ["发布人数","发布量","匹配量","响应率"], top: 0},
  xAxis: {type: "category", data: dates, axisLine: {lineStyle: {color: "#2a2a3a"}}},
  yAxis: [
    {type: "value", name: "人数/量", axisLine: {lineStyle: {color: "#2a2a3a"}}},
    {type: "value", name: "%", axisLine: {lineStyle: {color: "#2a2a3a"}}}
  ],
  series: [
    {name: "发布人数", type: "line", data: pubs, smooth: true, itemStyle: {color: "#4fc3f7"}},
    {name: "发布量", type: "line", data: pubs2, smooth: true, itemStyle: {color: "#66bb6a"}},
    {name: "匹配量", type: "line", data: matches, smooth: true, itemStyle: {color: "#ff9800"}},
    {name: "响应率", type: "line", yAxisIndex: 1, data: resp, smooth: true, itemStyle: {color: "#ef5350"}}
  ]
});
var tableHtml = "<table><thead><tr><th>日期</th><th>发布人数</th><th>发布量</th><th>报价量</th><th>匹配量</th><th>响应率</th><th>匹配率</th></tr></thead><tbody>";
var reversed = rawData.slice(-14).reverse();
for (var j = 0; j < reversed.length; j++) {
  var d = reversed[j];
  var rr = d.publish > 0 ? (d.quote / d.publish * 100).toFixed(1) : "0";
  var mr = d.quote > 0 ? (d.match / d.quote * 100).toFixed(1) : "0";
  tableHtml += "<tr><td>" + d.date + "</td><td>" + d.publishers + "</td><td>" + d.publish + "</td><td>" + d.quote + "</td><td>" + d.match + "</td><td>" + rr + "%</td><td>" + mr + "%</td></tr>";
}
tableHtml += "</tbody></table>";
document.getElementById("table-wrap").innerHTML = tableHtml;
</script>
</body></html>
